version: "3.8"

services:
  #Container của gateway
  gateway:
    build:
      context: ./gateway
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          cpus: "0.65"
    depends_on:
      - pdu-session

    
  pdu-session:
    build:
      context: ./pdu-session
    environment:
      - INSTANCE_ID=
      - PORT=9001 # Mỗi container sẽ có 1 IP riêng -> có port riêng
      - DELAY_MODE=random # Chế độ trễ: "fixed" hoặc "random"
    deploy:
      replicas: 4
      resources:
        limits:
          cpus: "0.65"

  